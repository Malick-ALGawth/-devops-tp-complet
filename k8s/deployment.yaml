apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-tp-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-tp-app
  template:
    metadata:
      labels:
        app: devops-tp-app
    spec:
      containers:
      - name: devops-tp-app
        image: devops-tp-complet:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-tp-service
  namespace: default
spec:
  selector:
    app: devops-tp-app
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30001
  type: NodePort
